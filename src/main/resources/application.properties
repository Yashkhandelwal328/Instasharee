# ─── Server ─────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── Static Resources (Frontend) ────────────────────────────────────────────
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# ─── Neon PostgreSQL ────────────────────────────────────────────────────────
# The database is OPTIONAL for core P2P signaling (which is in-memory).
# To connect to Neon PostgreSQL, set these environment variables:
#   DATABASE_URL=jdbc:postgresql://<host>/<db>?sslmode=require
#   DATABASE_USERNAME=<user>
#   DATABASE_PASSWORD=<password>
#
# When no DATABASE_URL is set, JPA auto-configuration is excluded
# and the app runs purely in-memory.
spring.datasource.url=${DATABASE_URL:}
spring.datasource.username=${DATABASE_USERNAME:}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA / Hibernate (active only when a datasource is configured)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─── Async / SSE ────────────────────────────────────────────────────────────
spring.mvc.async.request-timeout=600000

# ─── Multipart (for future file uploads) ────────────────────────────────────
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB